<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quản Lý Hồ Sơ – Balihouse Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --red:       #D94040;
  --red-soft:  #FCECEC;
  --red-mid:   #F5C0C0;
  --amber:     #C47D0E;
  --amber-soft:#FEF6E4;
  --amber-mid: #F8D98B;
  --green:     #2E7D32;
  --green-soft:#EDF7EE;
  --green-mid: #A5D6A7;
  --blue:      #1565C0;
  --blue-soft: #E8F0FE;
  --ink:       #1A1A2E;
  --ink2:      #3D3D5C;
  --ink3:      #7B7B9A;
  --border:    #E2E2EC;
  --bg:        #F5F5FA;
  --surface:   #FFFFFF;
  --sidebar-w: 220px;
  --header-h:  56px;
  --radius:    10px;
  --shadow:    0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
  --font:      'Inter', sans-serif;
  --mono:      'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--ink); font-size: 14px; }

/* ── LAYOUT ── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--ink); color: #fff;
  display: flex; flex-direction: column;
  transition: transform .25s;
  z-index: 100;
}
.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.sidebar-logo .brand { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
.sidebar-logo .sub { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 2px; }
.nav { flex: 1; padding: 10px 0; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px; font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,.6); cursor: pointer; border-radius: 0;
  transition: background .15s, color .15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.nav-item.active { background: rgba(217,64,64,.18); color: #fff; border-left-color: var(--red); }
.nav-icon { font-size: 16px; width: 20px; text-align: center; }
.nav-badge {
  margin-left: auto; background: var(--red);
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 99px; min-width: 18px; text-align: center;
}
.sidebar-footer {
  padding: 14px 18px; border-top: 1px solid rgba(255,255,255,.08);
  font-size: 11px; color: rgba(255,255,255,.3);
}

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── TOPBAR ── */
.topbar {
  height: var(--header-h); background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 12px;
  flex-shrink: 0; box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.topbar-title { font-size: 16px; font-weight: 700; color: var(--ink); flex: 1; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--ink2); cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--red); border-color: var(--red); color: #fff; }
.btn-primary:hover { background: #BF3535; border-color: #BF3535; }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--bg); }

/* ── CONTENT ── */
.content { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* ── STATS CARDS ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
  display: flex; flex-direction: column; gap: 6px;
  box-shadow: var(--shadow); cursor: pointer; transition: transform .15s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-card.active-filter { border-color: var(--red); box-shadow: 0 0 0 2px var(--red-mid); }
.stat-label { font-size: 12px; color: var(--ink3); font-weight: 500; }
.stat-val { font-size: 28px; font-weight: 700; line-height: 1; }
.stat-val.c-red    { color: var(--red); }
.stat-val.c-amber  { color: var(--amber); }
.stat-val.c-green  { color: var(--green); }
.stat-val.c-blue   { color: var(--blue); }
.stat-sub { font-size: 11px; color: var(--ink3); }

/* ── TOOLBAR ── */
.toolbar {
  display: flex; gap: 10px; align-items: center;
  margin-bottom: 14px; flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input {
  width: 100%; padding: 8px 12px 8px 34px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; background: var(--surface); color: var(--ink);
  outline: none; transition: border .15s;
}
.search-wrap input:focus { border-color: var(--red); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--ink3); font-size: 14px; }
.filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--ink3); cursor: pointer; transition: all .15s;
}
.pill:hover { border-color: var(--ink3); color: var(--ink); }
.pill.active { background: var(--ink); border-color: var(--ink); color: #fff; }
.pill.p-red.active   { background: var(--red); border-color: var(--red); }
.pill.p-amber.active { background: var(--amber); border-color: var(--amber); }
.pill.p-green.active { background: var(--green); border-color: var(--green); }

/* ── TABLE ── */
.table-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
}
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600;
  color: var(--ink3); text-transform: uppercase; letter-spacing: .5px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(0,0,0,.018); }
tbody tr.r-expired td { background: var(--red-soft); }
tbody tr.r-urgent td  { background: #FFF8EC; }
tbody tr.r-warn td    { background: var(--amber-soft); }
tbody tr.r-ok td      { background: var(--surface); }

.hs-name { font-weight: 600; font-size: 13px; color: var(--ink); }
.hs-num  { font-size: 12px; color: var(--ink3); font-family: var(--mono); margin-top: 2px; }

/* ── BADGES ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 600;
  white-space: nowrap;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; }
.b-expired { background: var(--red-mid);    color: #7A1F1F; }
.b-urgent  { background: #FFD580;           color: #6B3F00; }
.b-warn    { background: var(--amber-mid);  color: #5C3000; }
.b-ok      { background: var(--green-mid);  color: #1B4D1C; }
.b-done    { background: #E0E0F0;           color: #555577; }
.dot-expired { background: var(--red); }
.dot-urgent  { background: #E6A000; }
.dot-warn    { background: var(--amber); }
.dot-ok      { background: var(--green); }

.action-btn {
  padding: 4px 8px; border-radius: 6px; font-size: 12px;
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; color: var(--ink2); margin: 0 2px; transition: all .12s;
}
.action-btn:hover { background: var(--bg); }
.action-btn.del:hover { background: var(--red-soft); border-color: var(--red); color: var(--red); }

.table-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--ink3); background: var(--bg);
}

/* ── EMPTY STATE ── */
.empty {
  padding: 60px 20px; text-align: center; color: var(--ink3);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .35; }
.empty h3 { font-size: 15px; color: var(--ink2); margin-bottom: 6px; }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0; background: rgba(10,10,30,.45);
  backdrop-filter: blur(3px);
  display: none; align-items: center; justify-content: center;
  z-index: 999; padding: 20px;
}
.overlay.show { display: flex; }
.modal {
  background: var(--surface); border-radius: 14px;
  width: 100%; max-width: 560px; box-shadow: 0 24px 64px rgba(0,0,0,.18);
  overflow: hidden; animation: slideUp .22s ease;
}
@keyframes slideUp {
  from { transform: translateY(24px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-header {
  padding: 18px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close {
  width: 30px; height: 30px; border-radius: 50%;
  border: none; background: var(--bg); cursor: pointer;
  font-size: 16px; color: var(--ink3); display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: var(--red-soft); color: var(--red); }
.modal-body { padding: 22px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 12px; font-weight: 600; color: var(--ink2); }
.form-input {
  padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; font-family: var(--font); color: var(--ink);
  background: var(--surface); outline: none; transition: border .15s;
}
.form-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-soft); }
.form-input::placeholder { color: var(--ink3); }
.modal-footer {
  padding: 14px 22px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end;
  background: var(--bg);
}

/* ── DASHBOARD ── */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.chart-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow);
}
.chart-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--ink2); }
.chart-wrap { position: relative; height: 200px; }

/* ── SETUP SCREEN ── */
.setup-screen {
  max-width: 640px; margin: 40px auto; background: var(--surface);
  border-radius: 14px; border: 1px solid var(--border); padding: 32px;
  box-shadow: var(--shadow);
}
.setup-screen h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.setup-screen p { color: var(--ink2); font-size: 13px; margin-bottom: 20px; }
.setup-step {
  display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border);
}
.setup-step:last-child { border-bottom: none; }
.step-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--ink); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.step-body h4 { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.step-body p { font-size: 12px; color: var(--ink3); }
.code-block {
  background: var(--ink); color: #7FDBFF; font-family: var(--mono);
  font-size: 12px; padding: 10px 14px; border-radius: 8px;
  margin-top: 8px; word-break: break-all;
}
.setup-input-wrap { margin-top: 24px; }
.setup-input-wrap label { font-size: 12px; font-weight: 600; color: var(--ink2); display: block; margin-bottom: 6px; }
.setup-input-wrap input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px; margin-bottom: 12px;
  font-family: var(--mono); outline: none;
}
.setup-input-wrap input:focus { border-color: var(--red); }
.alert-box {
  padding: 12px 14px; border-radius: 8px; font-size: 13px;
  margin-top: 12px; display: none;
}
.alert-box.error { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-mid); display: block; }
.alert-box.success { background: var(--green-soft); color: var(--green); border: 1px solid var(--green-mid); display: block; }

/* ── LOADING ── */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,.85);
  display: none; align-items: center; justify-content: center;
  z-index: 9999; flex-direction: column; gap: 12px;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid var(--border); border-top-color: var(--red);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { font-size: 13px; color: var(--ink3); }

/* ── TOAST ── */
.toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,.14); animation: fadeIn .2s ease;
  max-width: 320px; display: flex; align-items: center; gap: 8px;
}
.toast.t-success { background: #1B5E20; color: #fff; }
.toast.t-error   { background: var(--red); color: #fff; }
.toast.t-info    { background: var(--ink); color: #fff; }
@keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ── SETTINGS PAGE ── */
.settings-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); margin-bottom: 16px;
}
.settings-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--ink); }
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border); gap: 16px;
}
.setting-row:last-child { border-bottom: none; }
.setting-info label { font-size: 13px; font-weight: 500; }
.setting-info p { font-size: 12px; color: var(--ink3); margin-top: 2px; }
.setting-ctrl input {
  padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; outline: none; width: 240px;
}
.setting-ctrl input:focus { border-color: var(--red); }

@media (max-width: 900px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-grid  { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .sidebar { position: fixed; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-txt" id="loadingTxt">Đang tải dữ liệu...</div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- MODAL THÊM / SỬA -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Thêm hồ sơ mới</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">STT</label>
          <input class="form-input" id="f-stt" type="number" placeholder="Tự động"/>
        </div>
        <div class="form-group">
          <label class="form-label">Số Hồ Sơ</label>
          <input class="form-input" id="f-sohs" placeholder="VD: GP-2024-001"/>
        </div>
        <div class="form-group full">
          <label class="form-label">Họ và Tên <span style="color:var(--red)">*</span></label>
          <input class="form-input" id="f-hoten" placeholder="VD: Nguyễn Văn A"/>
        </div>
        <div class="form-group full">
          <label class="form-label">Tên Hồ Sơ <span style="color:var(--red)">*</span></label>
          <input class="form-input" id="f-ten" placeholder="VD: Giấy phép kinh doanh"/>
        </div>
        <div class="form-group">
          <label class="form-label">Ngày Cấp</label>
          <input class="form-input" id="f-cap" type="date"/>
        </div>
        <div class="form-group">
          <label class="form-label">Ngày Hết Hạn <span style="color:var(--red)">*</span></label>
          <input class="form-input" id="f-han" type="date"/>
        </div>
        <div class="form-group full">
          <label class="form-label">Ghi Chú</label>
          <input class="form-input" id="f-ghichu" placeholder="Ghi chú thêm (nếu có)"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary" onclick="saveRecord()">💾 Lưu hồ sơ</button>
    </div>
  </div>
</div>

<!-- MODAL XÁC NHẬN XÓA -->
<div class="overlay" id="deleteOverlay">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <div class="modal-title" style="color:var(--red)">⚠️ Xác nhận xóa</div>
      <button class="modal-close" onclick="closeDelete()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;color:var(--ink2)">Bạn chắc chắn muốn xóa hồ sơ này không? Hành động này <strong>không thể hoàn tác</strong>.</p>
      <div style="margin-top:12px;padding:10px 14px;background:var(--red-soft);border-radius:8px;font-size:13px;font-weight:600;color:var(--red)" id="deleteTargetName"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeDelete()">Hủy</button>
      <button class="btn" style="background:var(--red);border-color:var(--red);color:#fff" onclick="confirmDelete()">🗑️ Xóa ngay</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="brand">📁 Hồ Sơ Manager</div>
      <div class="sub">Balihouse Garden</div>
    </div>
    <nav class="nav">
      <div class="nav-item active" onclick="goPage('tong-quan')" id="nav-tong-quan">
        <span class="nav-icon">📊</span> Tổng quan
      </div>
      <div class="nav-item" onclick="goPage('danh-sach')" id="nav-danh-sach">
        <span class="nav-icon">📋</span> Danh sách hồ sơ
        <span class="nav-badge" id="badgeCount" style="display:none">0</span>
      </div>
      <div class="nav-item" onclick="goPage('canh-bao')" id="nav-canh-bao">
        <span class="nav-icon">🔔</span> Cần xử lý
        <span class="nav-badge" id="badgeAlert" style="display:none">0</span>
      </div>
      <div class="nav-item" onclick="goPage('cai-dat')" id="nav-cai-dat">
        <span class="nav-icon">⚙️</span> Cài đặt
      </div>
    </nav>
    <div class="sidebar-footer">
      Cập nhật lúc <span id="lastSync">—</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">📊 Tổng quan</div>
      <button class="btn" onclick="refreshData()" title="Làm mới dữ liệu">🔄 Làm mới</button>
      <button class="btn btn-primary" onclick="openAddModal()">＋ Thêm hồ sơ</button>
    </div>

    <div class="content" id="mainContent">
      <!-- Nội dung được render bằng JS -->
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CẤU HÌNH — Chỉ thay đổi khi cần
// ══════════════════════════════════════════════════════════════
const CFG = {
  APPS_SCRIPT_URL: localStorage.getItem('appsScriptUrl') || 'https://script.google.com/macros/s/AKfycbxZWogsvX8bg6Pg2Sb0K_FtxXjkvZ_Q6mfwrueOvp2tDRtf45A798GfwOdYznHKvoZZXw/exec',
  NGAY_CANH_BAO:   parseInt(localStorage.getItem('ngayCanhBao') || '60'),
  SHEET_NAME:      localStorage.getItem('sheetName') || 'Sheet1',
};

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let allRecords   = [];   // Dữ liệu đầy đủ từ Sheets
let editingRow   = null; // Hàng đang sửa (null = thêm mới)
let deleteRowIdx = null; // Index hàng đang xóa
let currentPage  = 'tong-quan';
let filterStatus = 'all';
let searchQ      = '';
let charts       = {};

// ══════════════════════════════════════════════════════════════
// BOOTSTRAP
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  refreshData();
});

// ══════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════
function goPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-' + page);
  if (nav) nav.classList.add('active');

  const titles = {
    'tong-quan': '📊 Tổng quan',
    'danh-sach': '📋 Danh sách hồ sơ',
    'canh-bao':  '🔔 Cần xử lý',
    'cai-dat':   '⚙️ Cài đặt',
  };
  document.getElementById('pageTitle').textContent = titles[page] || '';
  renderPage();
}

function renderPage() {
  const el = document.getElementById('mainContent');
  if (currentPage === 'tong-quan') { renderDashboard(el); return; }
  if (currentPage === 'danh-sach') { renderTable(el, allRecords); return; }
  if (currentPage === 'canh-bao')  {
    const warn = allRecords.filter(r => r.status !== 'ok');
    renderTable(el, warn, true);
    return;
  }
  if (currentPage === 'cai-dat')   { renderSettings(el); return; }
}

// ══════════════════════════════════════════════════════════════
// FETCH DATA
// ══════════════════════════════════════════════════════════════
async function refreshData() {
  if (!CFG.APPS_SCRIPT_URL) { goPage('cai-dat'); return; }
  showLoading('Đang tải dữ liệu từ Google Sheets...');
  try {
    const url = CFG.APPS_SCRIPT_URL + '?action=getAll&sheet=' + encodeURIComponent(CFG.SHEET_NAME);
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allRecords = parseRecords(data.rows || []);
    updateBadges();
    renderPage();
    document.getElementById('lastSync').textContent = new Date().toLocaleTimeString('vi-VN');
    toast('✅ Đã tải ' + allRecords.length + ' hồ sơ', 'success');
  } catch(e) {
    toast('❌ Không kết nối được Google Sheets: ' + e.message, 'error');
    // Demo mode nếu chưa kết nối
    if (allRecords.length === 0) loadDemoData();
    renderPage();
  } finally {
    hideLoading();
  }
}

function parseRecords(rows) {
  // Cấu trúc cột Google Sheets:
  // A=STT, B=HọTên, C=TênHồSơ, D=SốHồSơ, E=NgàyCấp, F=NgàyHếtHạn, G=GhiChú, H=TrạngThái
  const today = new Date(); today.setHours(0,0,0,0);
  return rows.map((r, i) => {
    const han = parseDate(r[5]);
    const days = han ? Math.floor((han - today) / 86400000) : null;
    let status = 'ok';
    if (days === null) status = 'unknown';
    else if (days < 0) status = 'expired';
    else if (days <= 7) status = 'urgent';
    else if (days <= CFG.NGAY_CANH_BAO) status = 'warn';
    return {
      rowIndex:  i + 2,
      stt:       r[0] || (i + 1),
      hoten:     r[1] || '',
      ten:       r[2] || '',
      sohs:      r[3] || '',
      cap:       r[4] || '',
      han:       r[5] || '',
      hanDate:   han,
      ghichu:    r[6] || '',
      trangThai: r[7] || '',
      daysLeft:  days,
      status,
    };
  }).filter(r => r.ten || r.hoten);
}

function parseDate(val) {
  if (!val) return null;
  if (val instanceof Date) return new Date(val);
  const s = String(val).trim();
  // DD/MM/YYYY
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) { const d = new Date(+m[3], +m[2]-1, +m[1]); d.setHours(0,0,0,0); return d; }
  // YYYY-MM-DD
  const d2 = new Date(s); if (!isNaN(d2)) { d2.setHours(0,0,0,0); return d2; }
  return null;
}

function loadDemoData() {
  const today = new Date();
  const d = (n) => {
    const x = new Date(today); x.setDate(x.getDate() + n);
    return `${String(x.getDate()).padStart(2,'0')}/${String(x.getMonth()+1).padStart(2,'0')}/${x.getFullYear()}`;
  };
  // Cột: STT, HọTên, TênHồSơ, SốHồSơ, NgàyCấp, NgàyHếtHạn, GhiChú, TrạngThái
  const rows = [
    [1,'Nguyễn Văn An',    'Giấy phép kinh doanh',         'GP-2021-001',   '15/06/2021', d(-10), 'Ưu tiên cao',     ''],
    [2,'Trần Thị Bình',    'Chứng chỉ PCCC',                'PCCC-2022-015', '01/01/2022', d(-3),  '',                ''],
    [3,'Lê Hoàng Cường',   'Giấy phép vệ sinh ATTP',        'ATTP-2023-007', '20/08/2023', d(25),  '',                'Đã cảnh báo'],
    [4,'Phạm Thị Dung',    'Hợp đồng thuê mặt bằng',        'HĐ-2022-003',   '01/09/2022', d(47),  'Liên hệ chủ nhà',''],
    [5,'Hoàng Minh Đức',   'Bảo hiểm tài sản',              'BH-2024-011',   '15/09/2024', d(60),  '',                ''],
    [6,'Vũ Thị Lan',       'Giấy chứng nhận đăng ký thuế',  'MST-2020-088',  '10/01/2020', d(209), '',                ''],
    [7,'Đặng Quốc Huy',    'Giấy phép quảng cáo',           'QC-2023-044',   '05/03/2023', d(263), '',                ''],
  ];
  allRecords = parseRecords(rows);
  toast('ℹ️ Đang dùng dữ liệu demo. Vui lòng cài đặt URL Google Sheets.', 'info');
}

// ══════════════════════════════════════════════════════════════
// BADGE
// ══════════════════════════════════════════════════════════════
function updateBadges() {
  const warn = allRecords.filter(r => r.status !== 'ok' && r.status !== 'unknown').length;
  const bc = document.getElementById('badgeCount');
  const ba = document.getElementById('badgeAlert');
  if (allRecords.length > 0) { bc.style.display=''; bc.textContent = allRecords.length; }
  if (warn > 0) { ba.style.display=''; ba.textContent = warn; } else { ba.style.display='none'; }
}

// ══════════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════════
function renderDashboard(el) {
  const total   = allRecords.length;
  const expired = allRecords.filter(r => r.status === 'expired').length;
  const urgent  = allRecords.filter(r => r.status === 'urgent').length;
  const warn    = allRecords.filter(r => r.status === 'warn').length;
  const ok      = allRecords.filter(r => r.status === 'ok').length;

  // Top 5 sắp hết hạn gần nhất
  const upcoming = [...allRecords]
    .filter(r => r.daysLeft !== null)
    .sort((a,b) => a.daysLeft - b.daysLeft)
    .slice(0,5);

  el.innerHTML = `
  <div class="stats-grid">
    <div class="stat-card" onclick="goPage('danh-sach')">
      <div class="stat-label">Tổng hồ sơ</div>
      <div class="stat-val c-blue">${total}</div>
      <div class="stat-sub">Đang theo dõi</div>
    </div>
    <div class="stat-card" onclick="goPage('canh-bao')">
      <div class="stat-label">Đã hết hạn</div>
      <div class="stat-val c-red">${expired}</div>
      <div class="stat-sub">Cần gia hạn ngay</div>
    </div>
    <div class="stat-card" onclick="goPage('canh-bao')">
      <div class="stat-label">Sắp hết hạn (&lt;${CFG.NGAY_CANH_BAO} ngày)</div>
      <div class="stat-val c-amber">${warn + urgent}</div>
      <div class="stat-sub">Cần chú ý</div>
    </div>
    <div class="stat-card" onclick="goPage('danh-sach')">
      <div class="stat-label">Còn hạn</div>
      <div class="stat-val c-green">${ok}</div>
      <div class="stat-sub">Bình thường</div>
    </div>
  </div>

  <div class="dash-grid">
    <div class="chart-card">
      <h3>📈 Phân bổ trạng thái hồ sơ</h3>
      <div class="chart-wrap"><canvas id="chartDonut"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>📅 Hồ sơ sắp hết hạn gần nhất</h3>
      ${upcoming.length === 0 ? '<div class="empty"><div class="empty-icon">✅</div><h3>Không có hồ sơ cần cảnh báo</h3></div>' : `
      <table style="width:100%;font-size:13px;border-collapse:collapse;">
        <thead><tr>
          <th style="text-align:left;padding:6px 0;color:var(--ink3);font-size:11px;font-weight:600;border-bottom:1px solid var(--border)">HỒ SƠ</th>
          <th style="text-align:right;padding:6px 0;color:var(--ink3);font-size:11px;font-weight:600;border-bottom:1px solid var(--border)">CÒN LẠI</th>
        </tr></thead>
        <tbody>${upcoming.map(r=>`
        <tr>
          <td style="padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="font-weight:600;font-size:13px">${r.ten}</div>
            <div style="font-size:11px;color:var(--ink3)">${r.sohs || '—'}</div>
          </td>
          <td style="text-align:right;padding:8px 0;border-bottom:1px solid var(--border)">
            ${statusBadge(r)}
          </td>
        </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  </div>
  `;

  // Vẽ donut chart
  setTimeout(() => {
    const ctx = document.getElementById('chartDonut');
    if (!ctx) return;
    if (charts.donut) charts.donut.destroy();
    charts.donut = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Đã hết hạn','Khẩn cấp (<7 ngày)','Sắp hết (<60 ngày)','Còn hạn'],

}

// ══════════════════════════════════════════════════════════════
// TABLE
// ══════════════════════════════════════════════════════════════
function renderTable(el, records, warnOnly = false) {
  // Filter
  let filtered = records;
  if (searchQ) {
    const q = searchQ.toLowerCase();
    filtered = filtered.filter(r =>
      r.ten.toLowerCase().includes(q) ||
      r.hoten.toLowerCase().includes(q) ||
      r.sohs.toLowerCase().includes(q) ||
      r.ghichu.toLowerCase().includes(q)
    );
  }
  if (filterStatus !== 'all') {
    filtered = filtered.filter(r => r.status === filterStatus);
  }

  const stats = {
    total:   records.length,
    expired: records.filter(r=>r.status==='expired').length,
    warn:    records.filter(r=>r.status==='warn'||r.status==='urgent').length,
    ok:      records.filter(r=>r.status==='ok').length,
  };

  el.innerHTML = `
  <div class="stats-grid" style="margin-bottom:16px">
    <div class="stat-card ${filterStatus==='all'?'active-filter':''}" onclick="setFilter('all')">
      <div class="stat-label">Tổng</div>
      <div class="stat-val c-blue">${stats.total}</div>
    </div>
    <div class="stat-card ${filterStatus==='expired'?'active-filter':''}" onclick="setFilter('expired')">
      <div class="stat-label">Đã hết hạn</div>
      <div class="stat-val c-red">${stats.expired}</div>
    </div>
    <div class="stat-card ${filterStatus==='warn'?'active-filter':''}" onclick="setFilter('warn')">
      <div class="stat-label">Sắp hết hạn</div>
      <div class="stat-val c-amber">${stats.warn}</div>
    </div>
    <div class="stat-card ${filterStatus==='ok'?'active-filter':''}" onclick="setFilter('ok')">
      <div class="stat-label">Còn hạn</div>
      <div class="stat-val c-green">${stats.ok}</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Tìm theo tên, số hồ sơ, ghi chú..." value="${searchQ}"
        oninput="searchQ=this.value; renderPage()"/>
    </div>
    <button class="btn" onclick="exportExcel()">📥 Xuất Excel</button>
    <button class="btn" onclick="printTable()">🖨️ In danh sách</button>
  </div>

  <div class="table-wrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th style="width:44px">STT</th>
          <th>Họ và Tên</th>
          <th>Tên hồ sơ / Số hồ sơ</th>
          <th>Ngày cấp</th>
          <th>Ngày hết hạn</th>
          <th>Còn lại</th>
          <th>Ghi chú</th>
          <th>Trạng thái</th>
          <th style="width:90px;text-align:center">Thao tác</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.length === 0 ? `
          <tr><td colspan="9"><div class="empty">
            <div class="empty-icon">📭</div>
            <h3>${allRecords.length === 0 ? 'Chưa có hồ sơ nào' : 'Không tìm thấy hồ sơ phù hợp'}</h3>
            <p style="font-size:13px;margin-top:6px">${allRecords.length === 0 ? 'Nhấn "+ Thêm hồ sơ" để bắt đầu' : 'Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm'}</p>
          </div></td></tr>
        ` : filtered.map(r => `
        <tr class="r-${r.status}">
          <td style="color:var(--ink3);text-align:center">${r.stt}</td>
          <td>
            <div style="font-weight:600;font-size:13px;color:var(--ink)">${r.hoten || '—'}</div>
          </td>
          <td>
            <div class="hs-name">${r.ten}</div>
            <div class="hs-num">${r.sohs || '—'}</div>
          </td>
          <td style="color:var(--ink2)">${r.cap || '—'}</td>
          <td style="font-weight:600">${r.han || '—'}</td>
          <td>${statusBadge(r)}</td>
          <td style="color:var(--ink3);max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.ghichu || '—'}</td>
          <td>${r.trangThai === 'Đã cảnh báo'
            ? '<span class="badge b-done">✉️ Đã cảnh báo</span>'
            : '<span style="color:var(--ink3);font-size:12px">—</span>'
          }</td>
          <td style="text-align:center;white-space:nowrap">
            <button class="action-btn" onclick='openEditModal(${JSON.stringify(r)})' title="Sửa">✏️</button>
            <button class="action-btn del" onclick="openDelete(${r.rowIndex}, '${(r.hoten||r.ten).replace(/'/g,"\\'")}', ${filtered.indexOf(r)})" title="Xóa">🗑️</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div class="table-footer">
      <span>Hiển thị <strong>${filtered.length}</strong> / ${records.length} hồ sơ</span>
      <span style="display:flex;gap:12px">
        ${stats.expired>0?`<span style="color:var(--red);font-weight:600">${stats.expired} hết hạn</span>`:''}
        ${stats.warn>0?`<span style="color:var(--amber);font-weight:600">${stats.warn} sắp hết</span>`:''}
      </span>
    </div>
  </div>`;
}

function setFilter(f) { filterStatus = f; renderPage(); }

function statusBadge(r) {
  if (r.status === 'expired') return `<span class="badge b-expired"><span class="badge-dot dot-expired"></span>Hết hạn ${Math.abs(r.daysLeft)} ngày</span>`;
  if (r.status === 'urgent')  return `<span class="badge b-urgent"><span class="badge-dot dot-urgent"></span>Còn ${r.daysLeft} ngày ⚡</span>`;
  if (r.status === 'warn')    return `<span class="badge b-warn"><span class="badge-dot dot-warn"></span>Còn ${r.daysLeft} ngày</span>`;
  if (r.status === 'ok')      return `<span class="badge b-ok"><span class="badge-dot dot-ok"></span>Còn ${r.daysLeft} ngày</span>`;
  return '<span style="color:var(--ink3);font-size:12px">—</span>';
}

// ══════════════════════════════════════════════════════════════
// MODAL THÊM / SỬA
// ══════════════════════════════════════════════════════════════
function openAddModal() {
  editingRow = null;
  document.getElementById('modalTitle').textContent = '➕ Thêm hồ sơ mới';
  document.getElementById('f-stt').value    = allRecords.length + 1;
  document.getElementById('f-hoten').value  = '';
  document.getElementById('f-sohs').value   = '';
  document.getElementById('f-ten').value    = '';
  document.getElementById('f-cap').value    = '';
  document.getElementById('f-han').value    = '';
  document.getElementById('f-ghichu').value = '';
  document.getElementById('modalOverlay').classList.add('show');
}

function openEditModal(r) {
  editingRow = r;
  document.getElementById('modalTitle').textContent = '✏️ Sửa hồ sơ';
  document.getElementById('f-stt').value    = r.stt;
  document.getElementById('f-hoten').value  = r.hoten || '';
  document.getElementById('f-sohs').value   = r.sohs;
  document.getElementById('f-ten').value    = r.ten;
  document.getElementById('f-cap').value    = toInputDate(r.cap);
  document.getElementById('f-han').value    = toInputDate(r.han);
  document.getElementById('f-ghichu').value = r.ghichu;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function toInputDate(str) {
  if (!str) return '';
  const m = String(str).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return str;
}

function fromInputDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-');
  return `${d}/${m}/${y}`;
}

async function saveRecord() {
  const hoten = document.getElementById('f-hoten').value.trim();
  const ten   = document.getElementById('f-ten').value.trim();
  const han   = document.getElementById('f-han').value;
  if (!hoten) { toast('⚠️ Vui lòng nhập Họ và Tên', 'error'); return; }
  if (!ten)   { toast('⚠️ Vui lòng nhập Tên Hồ Sơ', 'error'); return; }
  if (!han)   { toast('⚠️ Vui lòng nhập Ngày Hết Hạn', 'error'); return; }

  // Thứ tự cột: STT, HọTên, TênHồSơ, SốHồSơ, NgàyCấp, NgàyHếtHạn, GhiChú, TrạngThái
  const row = [
    document.getElementById('f-stt').value    || '',
    hoten,
    ten,
    document.getElementById('f-sohs').value   || '',
    fromInputDate(document.getElementById('f-cap').value),
    fromInputDate(han),
    document.getElementById('f-ghichu').value || '',
    editingRow ? (editingRow.trangThai || '') : '',
  ];

  showLoading(editingRow ? 'Đang cập nhật...' : 'Đang thêm hồ sơ...');
  closeModal();
  try {
    // Dùng GET + encodeURIComponent để tránh CORS với Apps Script
    const action   = editingRow ? 'update' : 'append';
    const rowParam = editingRow ? `&rowIndex=${editingRow.rowIndex}` : '';
    const dataParam = encodeURIComponent(JSON.stringify(row));
    const url = `${CFG.APPS_SCRIPT_URL}?action=${action}&sheet=${encodeURIComponent(CFG.SHEET_NAME)}${rowParam}&data=${dataParam}`;
    const res  = await fetch(url);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    toast(editingRow ? '✅ Đã cập nhật hồ sơ' : '✅ Đã thêm hồ sơ mới', 'success');
    await refreshData();
  } catch(e) {
    toast('❌ Lỗi: ' + e.message, 'error');
    hideLoading();
  }
}

// ══════════════════════════════════════════════════════════════
// XÓA
// ══════════════════════════════════════════════════════════════
function openDelete(rowIndex, name, idx) {
  deleteRowIdx = { rowIndex, idx };
  document.getElementById('deleteTargetName').textContent = name;
  document.getElementById('deleteOverlay').classList.add('show');
}
function closeDelete() { document.getElementById('deleteOverlay').classList.remove('show'); }

async function confirmDelete() {
  if (!deleteRowIdx) return;
  closeDelete();
  showLoading('Đang xóa hồ sơ...');
  try {
    // Dùng GET để tránh CORS
    const url = `${CFG.APPS_SCRIPT_URL}?action=delete&sheet=${encodeURIComponent(CFG.SHEET_NAME)}&rowIndex=${deleteRowIdx.rowIndex}`;
    const res  = await fetch(url);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    toast('🗑️ Đã xóa hồ sơ', 'success');
    await refreshData();
  } catch(e) {
    toast('❌ Lỗi: ' + e.message, 'error');
    hideLoading();
  }
}

function saveSettings() {
  CFG.APPS_SCRIPT_URL = document.getElementById('inp-url').value.trim();
  CFG.SHEET_NAME      = document.getElementById('inp-sheet').value.trim() || 'Sheet1';
  CFG.NGAY_CANH_BAO   = parseInt(document.getElementById('inp-days').value) || 60;
  localStorage.setItem('appsScriptUrl', CFG.APPS_SCRIPT_URL);
  localStorage.setItem('sheetName',     CFG.SHEET_NAME);
  localStorage.setItem('ngayCanhBao',   CFG.NGAY_CANH_BAO);
  toast('✅ Đã lưu cài đặt', 'success');
  if (CFG.APPS_SCRIPT_URL) refreshData();
}

async function testConnection() {
  const url = document.getElementById('inp-url').value.trim();
  if (!url) { showConnAlert('error', '⚠️ Vui lòng nhập URL trước'); return; }
  showConnAlert('', '🔄 Đang kiểm tra kết nối...');
  try {
    const res  = await fetch(url + '?action=ping');
    const json = await res.json();
    if (json.status === 'ok') showConnAlert('success', '✅ Kết nối thành công! Google Sheets đã sẵn sàng.');
    else showConnAlert('error', '❌ Kết nối thất bại: ' + (json.error || 'Lỗi không xác định'));
  } catch(e) {
    showConnAlert('error', '❌ Không thể kết nối. Kiểm tra lại URL và quyền truy cập.');
  }
}

function showConnAlert(type, msg) {
  const el = document.getElementById('connAlert');
  if (!el) return;
  el.className = 'alert-box ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '');
  el.style.display = 'block';
  el.textContent = msg;
}

// ══════════════════════════════════════════════════════════════
// XUẤT EXCEL
// ══════════════════════════════════════════════════════════════
function exportExcel() {
  try {
    const header = ['STT','Họ và Tên','Tên Hồ Sơ','Số Hồ Sơ','Ngày Cấp','Ngày Hết Hạn','Còn Lại (ngày)','Ghi Chú','Trạng Thái'];
    const rows   = allRecords.map(r => [
      r.stt, r.hoten, r.ten, r.sohs, r.cap, r.han,
      r.daysLeft !== null ? r.daysLeft : '—',
      r.ghichu, r.trangThai || '—',
    ]);
    const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
    ws['!cols'] = [6,22,30,18,14,14,14,25,16].map(w=>({wch:w}));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Hồ Sơ');
    const date = new Date().toLocaleDateString('vi-VN').replace(/\//g,'-');
    XLSX.writeFile(wb, `QuanLyHoSo_${date}.xlsx`);
    toast('📥 Đã xuất file Excel', 'success');
  } catch(e) {
    toast('❌ Lỗi xuất Excel: ' + e.message, 'error');
  }
}

function printTable() {
  const rows = allRecords.map(r => `
    <tr style="border-bottom:1px solid #ddd">
      <td>${r.stt}</td>
      <td><strong>${r.hoten||'—'}</strong></td>
      <td><strong>${r.ten}</strong><br><small style="color:#888">${r.sohs||'—'}</small></td>
      <td>${r.cap||'—'}</td>
      <td>${r.han||'—'}</td>
      <td>${r.daysLeft!==null?(r.daysLeft<0?'Hết hạn '+Math.abs(r.daysLeft)+' ngày':'Còn '+r.daysLeft+' ngày'):'—'}</td>
      <td>${r.ghichu||'—'}</td>
    </tr>`).join('');
  const w = window.open('','_blank');
  w.document.write(`

    <style>body{font-family:Arial;font-size:13px;padding:20px}
    h2{text-align:center;margin-bottom:4px}
    p{text-align:center;color:#666;margin-bottom:16px}
    table{width:100%;border-collapse:collapse}
    th{background:#1A1A2E;color:#fff;padding:8px;text-align:left}
    td{padding:7px 8px}
    @media print{button{display:none}}</style>
    </head><body>
    <h2>📁 Danh Sách Hồ Sơ – Balihouse Garden</h2>
    <p>In ngày: ${new Date().toLocaleDateString('vi-VN')} | Tổng: ${allRecords.length} hồ sơ</p>

      <th>Ngày Cấp</th><th>Ngày Hết Hạn</th><th>Còn Lại</th><th>Ghi Chú</th>

// ══════════════════════════════════════════════════════════════
// COPY BACKEND CODE
// ══════════════════════════════════════════════════════════════
function copyBackendCode() {
  const code = `// ═══════════════════════════════════════════════════════
// BACKEND APPS SCRIPT – Quản Lý Hồ Sơ Balihouse Garden
// Phiên bản: 2.0 – Tất cả qua GET để tránh lỗi CORS
// ═══════════════════════════════════════════════════════

function doGet(e) {
  // Cho phép mọi nguồn gọi vào (CORS)
  const output = handleRequest(e);
  return output;
}

function handleRequest(e) {
  const action    = e.parameter.action    || '';
  const sheetName = e.parameter.sheet     || 'Sheet1';
  const ss        = SpreadsheetApp.getActiveSpreadsheet();
  const sheet     = ss.getSheetByName(sheetName);

  // ── PING: kiểm tra kết nối ──
  if (action === 'ping') {
    return ok({ status: 'ok', message: 'Kết nối thành công!' });
  }

  // ── GET ALL: lấy toàn bộ dữ liệu ──
  if (action === 'getAll') {
    if (!sheet) return err('Không tìm thấy sheet: ' + sheetName);
    const lastRow = sheet.getLastRow();
    if (lastRow < 2) return ok({ rows: [] });
    const data = sheet.getRange(2, 1, lastRow - 1, 8).getValues();
    return ok({ rows: data });
  }

  // ── APPEND: thêm hồ sơ mới ──
  if (action === 'append') {
    if (!sheet) return err('Không tìm thấy sheet: ' + sheetName);
    const data = JSON.parse(decodeURIComponent(e.parameter.data || '[]'));
    sheet.appendRow(data);
    return ok({ status: 'ok' });
  }

  // ── UPDATE: cập nhật hồ sơ ──
  if (action === 'update') {
    if (!sheet) return err('Không tìm thấy sheet: ' + sheetName);
    const rowIndex = parseInt(e.parameter.rowIndex);
    const data     = JSON.parse(decodeURIComponent(e.parameter.data || '[]'));
    if (!rowIndex) return err('Thiếu rowIndex');
    sheet.getRange(rowIndex, 1, 1, data.length).setValues([data]);
    return ok({ status: 'ok' });
  }

  // ── DELETE: xóa hồ sơ ──
  if (action === 'delete') {
    if (!sheet) return err('Không tìm thấy sheet: ' + sheetName);
    const rowIndex = parseInt(e.parameter.rowIndex);
    if (!rowIndex) return err('Thiếu rowIndex');
    sheet.deleteRow(rowIndex);
    return ok({ status: 'ok' });
  }

  return err('Action không hợp lệ: ' + action);
}

// Hàm tiện ích trả về JSON
function ok(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}
function err(msg) {
  return ContentService
    .createTextOutput(JSON.stringify({ error: msg }))
    .setMimeType(ContentService.MimeType.JSON);
}
`;
  navigator.clipboard.writeText(code).then(() => {
    toast('📋 Đã copy code Backend! Dán vào Apps Script.', 'success');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = code; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    toast('📋 Đã copy code Backend!', 'success');
  });
}

// ══════════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════════
function showLoading(msg) {
  document.getElementById('loadingTxt').textContent = msg || 'Đang xử lý...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

function toast(msg, type = 'info') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast t-${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// Đóng modal khi click nền
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('deleteOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDelete();
});
