<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quản Lý Hồ Sơ – Balihouse Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --red:#D94040;--red-s:#FCECEC;--red-m:#F5C0C0;
  --amber:#C47D0E;--amber-s:#FEF6E4;--amber-m:#F8D98B;
  --green:#2E7D32;--green-s:#EDF7EE;--green-m:#A5D6A7;
  --blue:#1565C0;--blue-s:#E8F0FE;--blue-m:#90CAF9;
  --ink:#1A1A2E;--ink2:#3D3D5C;--ink3:#7B7B9A;--ink4:#B0B0C8;
  --border:#E2E2EC;--bg:#F4F4FA;--surface:#FFFFFF;
  --sw:224px;--hh:58px;--r:10px;
  --sh:0 1px 4px rgba(0,0,0,.07),0 4px 20px rgba(0,0,0,.05);
  --f:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--f);background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:var(--sw);min-width:var(--sw);background:linear-gradient(180deg,#1A1A2E 0%,#16213E 100%);color:#fff;display:flex;flex-direction:column;box-shadow:2px 0 12px rgba(0,0,0,.15)}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo .brand{font-size:16px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.sb-logo .brand span{background:var(--red);width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-logo .sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:5px;padding-left:36px}
.nav{flex:1;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;border-radius:8px;transition:all .15s;position:relative}
.ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.ni.active{background:rgba(217,64,64,.22);color:#fff}
.ni.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--red);border-radius:0 3px 3px 0}
.ni-ico{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.nb{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;min-width:20px;text-align:center}
.sb-foot{padding:16px 20px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:rgba(255,255,255,.25);line-height:1.5}

/* ── MAIN ── */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{height:var(--hh);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tb-title{font-size:16px;font-weight:700;color:var(--ink);flex:1}
.ct{flex:1;overflow-y:auto;padding:22px 24px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--ink2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--f)}
.btn:hover{background:var(--bg);border-color:var(--ink4)}
.btn-p{background:var(--red);border-color:var(--red);color:#fff}
.btn-p:hover{background:#BF3535;border-color:#BF3535}
.btn-b{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-b:hover{background:#0D47A1}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:var(--bg)}

/* ── STATS ── */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.sc:hover{transform:translateY(-2px);box-shadow:0 4px 24px rgba(0,0,0,.1)}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.sc.c-blue::after{background:var(--blue)}.sc.c-red::after{background:var(--red)}.sc.c-amber::after{background:var(--amber)}.sc.c-green::after{background:var(--green)}
.sc-label{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sc-val{font-size:32px;font-weight:700;line-height:1;margin-bottom:4px}
.sc-val.c-blue{color:var(--blue)}.sc-val.c-red{color:var(--red)}.sc-val.c-amber{color:var(--amber)}.sc-val.c-green{color:var(--green)}
.sc-sub{font-size:11px;color:var(--ink3)}

/* ── TOOLBAR ── */
.tbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.sw-wrap{position:relative;flex:1;min-width:220px}
.sw-wrap input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);color:var(--ink);outline:none;transition:border .15s;font-family:var(--f)}
.sw-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-s)}
.sw-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:15px}
.filter-tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px}
.ft{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;color:var(--ink3);cursor:pointer;transition:all .15s;border:none;background:transparent;font-family:var(--f)}
.ft.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.ft.ft-red.active{color:var(--red)}.ft.ft-amber.active{color:var(--amber)}.ft.ft-green.active{color:var(--green)}

/* ── TABLE ── */
.tw{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse}
thead th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;user-select:none}
tbody td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.tf{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--ink3);background:var(--bg)}

/* ── PERSON ROW ── */
.pr{cursor:pointer;transition:background .12s}
.pr:hover td{background:#F0F4FF}
.pr.open td{background:#EEF2FF}
.pr td{transition:background .12s}
.exp-ico{display:inline-block;transition:transform .2s;font-size:10px;color:var(--ink3);margin-right:2px}
.pr.open .exp-ico{transform:rotate(90deg)}
.pname{font-weight:600;font-size:13px;color:var(--ink)}
.psub{font-size:11px;color:var(--ink3);margin-top:2px;display:flex;align-items:center;gap:6px}
.psub-dot{width:4px;height:4px;border-radius:50%;background:var(--ink4);display:inline-block}

/* ── SUB TABLE ── */
.sub-row td{padding:0!important;border-bottom:2px solid var(--blue-m)!important}
.sub-wrap{background:#F7F9FF;border-top:1px solid #D0D8FF}
.sub-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 10px 52px}
.sub-hd h4{font-size:12px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:6px}
.sub-wrap table{border:none;box-shadow:none}
.sub-wrap thead th{background:#EEF2FF;font-size:10px;border-bottom:1px solid #C5CEFF;padding:8px 12px}
.sub-wrap tbody td{padding:9px 12px;font-size:13px;background:transparent;color:var(--ink2)}
.sub-wrap tbody tr:hover td{background:#E8EDFF}
.sub-wrap tbody tr:last-child td{border-bottom:none}
.sub-empty{padding:20px;text-align:center;color:var(--ink3);font-size:13px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.bd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.b-exp{background:#FFD5D5;color:#7A1F1F}.bd-exp{background:var(--red)}
.b-urg{background:#FFE9A0;color:#6B3F00}.bd-urg{background:#E6A000}
.b-wrn{background:var(--amber-m);color:#5C3000}.bd-wrn{background:var(--amber)}
.b-ok{background:var(--green-m);color:#1B4D1C}.bd-ok{background:var(--green)}
.b-done{background:#E0E0F0;color:#555577}
.b-phone{background:var(--blue-s);color:var(--blue);font-family:monospace}

/* ── ALERT COL ── */
.al-safe{color:var(--green);font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px}
.al-warn{color:var(--amber);font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px}
.al-danger{color:var(--red);font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px}

/* ── ACTION BTNS ── */
.ab{padding:5px 8px;border-radius:6px;font-size:12px;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--ink2);transition:all .12s;line-height:1}
.ab:hover{background:var(--bg)}
.ab.del:hover{background:var(--red-s);border-color:var(--red-m);color:var(--red)}
.ab.view:hover{background:var(--blue-s);border-color:var(--blue-m);color:var(--blue)}

/* ── MODALS ── */
.ov{position:fixed;inset:0;background:rgba(10,10,30,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:999;padding:20px}
.ov.show{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:620px;box-shadow:0 32px 80px rgba(0,0,0,.2);overflow:hidden;animation:su .22s ease;max-height:92vh;display:flex;flex-direction:column}
.modal.sm{max-width:440px}
.modal.lg{max-width:780px}
@keyframes su{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mh-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.mc{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:18px;color:var(--ink3);display:flex;align-items:center;justify-content:center;transition:all .15s}
.mc:hover{background:var(--red-s);color:var(--red)}
.mb{padding:24px;overflow-y:auto;flex:1}
.mf{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:var(--bg);flex-shrink:0}

/* ── FORM ── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fi{display:flex;flex-direction:column;gap:6px}
.fi.full{grid-column:1/-1}
.fi.w1{grid-column:span 1}
.fl{font-size:12px;font-weight:600;color:var(--ink2)}
.fl .req{color:var(--red);margin-left:2px}
.finp{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--f);color:var(--ink);background:var(--surface);outline:none;transition:border .15s;width:100%}
.finp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-s)}
.finp::placeholder{color:var(--ink4)}
select.finp{cursor:pointer}
.fsec{grid-column:1/-1;padding:6px 0 8px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:8px}
.owner-box{padding:10px 14px;background:var(--blue-s);border-radius:8px;font-size:13px;color:var(--blue);font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.avt-row{display:flex;gap:20px;margin-bottom:16px}
.avt-preview{width:80px;height:120px;border-radius:8px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg);overflow:hidden;flex-shrink:0;position:relative;transition:border .15s}
.avt-preview:hover{border-color:var(--blue)}
.avt-preview img{width:100%;height:100%;object-fit:cover;display:none}
.avt-ph{text-align:center;color:var(--ink4);font-size:11px;font-weight:600;line-height:1.4}
.avt-sm{width:32px;height:48px;border-radius:4px;object-fit:cover;background:var(--bg);border:1px solid var(--border)}
.avt-circle{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink4)}

/* ── DETAIL MODAL ── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.detail-item{background:var(--bg);border-radius:8px;padding:12px 14px}
.detail-label{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.detail-val{font-size:13px;font-weight:500;color:var(--ink)}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.cc h3{font-size:13px;font-weight:700;margin-bottom:16px;color:var(--ink2);display:flex;align-items:center;gap:6px}
.cw{position:relative;height:210px}

/* ── SETTINGS ── */
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;box-shadow:var(--sh);margin-bottom:16px}
.scard h3{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.sr{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:20px}
.sr:last-child{border-bottom:none}
.sr-info label{font-size:13px;font-weight:600;color:var(--ink)}
.sr-info p{font-size:12px;color:var(--ink3);margin-top:3px;line-height:1.4}
.sr-ctrl{flex-shrink:0}
.sr-ctrl input,.sr-ctrl select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;font-family:var(--f);color:var(--ink);min-width:220px}
.sr-ctrl input:focus{border-color:var(--blue)}
.sr-ctrl input.sm{min-width:80px}
.ab-box{padding:12px 14px;border-radius:8px;font-size:13px;margin-top:14px;display:none;align-items:center;gap:8px}
.ab-box.show{display:flex}
.ab-box.ok{background:var(--green-s);color:var(--green);border:1px solid var(--green-m)}
.ab-box.err{background:var(--red-s);color:var(--red);border:1px solid var(--red-m)}
.ab-box.info{background:var(--blue-s);color:var(--blue);border:1px solid var(--blue-m)}
.sstep{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.sstep:last-child{border-bottom:none}
.snum{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.sbody h4{font-size:13px;font-weight:600;margin-bottom:4px}
.sbody p{font-size:12px;color:var(--ink3);line-height:1.5}
.code{background:var(--ink);color:#7FDBFF;font-family:monospace;font-size:11px;padding:10px 14px;border-radius:8px;margin-top:8px;white-space:pre-wrap;word-break:break-all;line-height:1.6}

/* ── EMPTY ── */
.empty{padding:60px 20px;text-align:center;color:var(--ink3)}
.empty-ico{font-size:52px;margin-bottom:14px;opacity:.3}
.empty h3{font-size:15px;color:var(--ink2);margin-bottom:6px;font-weight:600}
.empty p{font-size:13px;margin-top:4px}

/* ── LOADING / TOAST ── */
.lo{position:fixed;inset:0;background:rgba(255,255,255,.88);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:14px}
.lo.show{display:flex}
.spin{width:38px;height:38px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--red);animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lo-txt{font-size:13px;color:var(--ink3);font-weight:500}
.tw-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:360px}
.toast{padding:13px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.15);animation:fi .2s ease;display:flex;align-items:center;gap:10px}
.toast.ok{background:#1B5E20;color:#fff}.toast.err{background:var(--red);color:#fff}.toast.info{background:var(--ink);color:#fff}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── PRINT BADGE ── */
.del-target{margin-top:12px;padding:12px 14px;background:var(--red-s);border-radius:8px;font-size:13px;font-weight:600;color:var(--red);border:1px solid var(--red-m)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* ── RESPONSIVE ── */
@media(max-width:1100px){.sg{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}
@media(max-width:640px){.sb{display:none}.sg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="lo" id="lo"><div class="spin"></div><div class="lo-txt" id="lo-txt">Đang tải...</div></div>

<!-- TOAST -->
<div class="tw-wrap" id="tw"></div>

<!-- MODAL NHÂN SỰ -->
<div class="ov" id="ovNS">
<div class="modal">
  <div class="mh">
    <div class="mh-title" id="nsTit">➕ Thêm nhân sự</div>
    <button class="mc" onclick="closeOv('ovNS')">✕</button>
  </div>
  <div class="mb">
    <div class="avt-row">
      <div class="avt-preview" id="ns-avt-preview" onclick="document.getElementById('ns-avt-file').click()">
        <span class="avt-ph" id="ns-avt-ph">📷<br>Ảnh 4x6</span>
        <img id="ns-avt-img" src=""/>
        <input type="file" id="ns-avt-file" accept="image/*" style="display:none" onchange="previewAvatar(this)"/>
        <input type="hidden" id="ns-avt-url"/>
        <input type="hidden" id="ns-avt-base64"/>
      </div>
      <div class="fg" style="flex:1">
        <div class="fsec">👤 Thông tin cá nhân</div>
        <div class="fi w1"><label class="fl">STT</label><input class="finp" id="ns-stt" type="number" placeholder="Tự động"/></div>
        <div class="fi w1"><label class="fl">Giới tính</label>
          <select class="finp" id="ns-gt"><option>Nam</option><option>Nữ</option><option>Khác</option></select>
        </div>
        <div class="fi full"><label class="fl">Họ và Tên<span class="req">*</span></label><input class="finp" id="ns-ht" placeholder="VD: Nguyễn Hoàng Minh Phúc"/></div>
      </div>
    </div>
    <div class="fg">
      <div class="fi w1"><label class="fl">Ngày sinh</label><input class="finp" id="ns-ns" type="date"/></div>
      <div class="fi w1"><label class="fl">Nơi sinh</label><input class="finp" id="ns-nsi" placeholder="VD: TP.HCM"/></div>
      <div class="fi w1"><label class="fl">Số điện thoại</label><input class="finp" id="ns-dt" placeholder="VD: 0901234567" type="tel"/></div>
      <div class="fi w1"><label class="fl">Email</label><input class="finp" id="ns-em" placeholder="VD: ten@email.com" type="email"/></div>
      <div class="fi w1"><label class="fl">Nơi ở hiện tại</label><input class="finp" id="ns-no" placeholder="VD: Q.7, TP.HCM"/></div>
      <div class="fi w1"><label class="fl">Quê quán</label><input class="finp" id="ns-qq" placeholder="VD: Long An"/></div>
    </div>
  </div>
  <div class="mf">
    <button class="btn" onclick="closeOv('ovNS')">Hủy</button>
    <button class="btn btn-p" onclick="saveNS()">💾 Lưu nhân sự</button>
  </div>
</div>
</div>

<!-- MODAL HỒ SƠ -->

<script>
// ══════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════
const CFG = {
  URL:    localStorage.getItem('gsUrl')    || 'https://script.google.com/macros/s/AKfycbxZWogsvX8bg6Pg2Sb0K_FtxXjkvZ_Q6mfwrueOvp2tDRtf45A798GfwOdYznHKvoZZXw/exec',

  SH_HS:  localStorage.getItem('shHS')    || 'HoSo',
  DAYS:   parseInt(localStorage.getItem('cbDays') || '60'),
  ADMIN:  localStorage.getItem('adMail')   || '',
};

// ── STATE ──
let NS=[], HS=[], page='dash', searchQ='', filterSt='all', expanded=new Set();
let editNS=null, editHS=null, addNSForHS=null, delTarget=null, detailNS=null;
let charts={};

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', ()=>{ refreshData(); });

// ══════════════════════════════════════════════════════════
// DATE UTILS — fix lỗi hiển thị ngày sai múi giờ
// ══════════════════════════════════════════════════════════
function fmtD(v){
  if(!v||v==='—') return '—';
  if(v instanceof Date && !isNaN(v)){
    return `${String(v.getUTCDate()).padStart(2,'0')}/${String(v.getUTCMonth()+1).padStart(2,'0')}/${v.getUTCFullYear()}`;
  }
  const s=String(v).trim();
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)) return s;
  const d=new Date(s);
  if(!isNaN(d)) return `${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${d.getUTCFullYear()}`;
  return s;
}
function parseD(v){
  if(!v) return null;
  if(v instanceof Date && !isNaN(v)){const d=new Date(v.getUTCFullYear(),v.getUTCMonth(),v.getUTCDate());d.setHours(0,0,0,0);return d;}
  const s=String(v).trim();
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){const d=new Date(+m[3],+m[2]-1,+m[1]);d.setHours(0,0,0,0);return d;}
  const iso=new Date(s);
  if(!isNaN(iso)){const d=new Date(iso.getUTCFullYear(),iso.getUTCMonth(),iso.getUTCDate());d.setHours(0,0,0,0);return d;}
  return null;
}
function toInp(v){if(!v) return '';const d=parseD(v);if(!d) return '';return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fromInp(s){if(!s) return '';const[y,m,d]=s.split('-');return `${d}/${m}/${y}`;}
function daysLeft(v){const d=parseD(v);if(!d) return null;const t=new Date();t.setHours(0,0,0,0);return Math.floor((d-t)/86400000);}
function stOf(days){if(days===null) return 'unk';if(days<0) return 'exp';if(days<=7) return 'urg';if(days<=CFG.DAYS) return 'wrn';return 'ok';}

// ══════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════
async function refreshData(){
  showLo('Đang tải dữ liệu từ Google Sheets...');
  try{
    const[rNS,rHS]=await Promise.all([
      fetch(`${CFG.URL}?action=getAll&sheet=${enc(CFG.SH_NS)}`).then(r=>r.json()),
      fetch(`${CFG.URL}?action=getAll&sheet=${enc(CFG.SH_HS)}`).then(r=>r.json()),
    ]);
    if(rNS.error) throw new Error('Sheet '+CFG.SH_NS+': '+rNS.error);
    if(rHS.error) throw new Error('Sheet '+CFG.SH_HS+': '+rHS.error);
    HS=parseHS(rHS.rows||[]);
    NS=parseNS(rNS.rows||[]);
    afterLoad();
    toast(`✅ Đã tải ${NS.length} nhân sự, ${HS.length} hồ sơ`,'ok');
  }catch(e){
    toast('⚠️ '+e.message+' — dùng dữ liệu demo','err');
    loadDemo(); afterLoad();
  }finally{hideLo();}
}

function parseHS(rows){
  // Cột HoSo: STT|MãNS|LoạiHS|SốHS|NgàyCấp|NgàyHH|NơiCấp|GhiChú|TrạngThái
  return rows.map((r,i)=>{
    const days=daysLeft(r[5]);
    return{ri:i+2,stt:r[0]||i+1,maNS:String(r[1]||'').trim(),loai:r[2]||'',so:r[3]||'',cap:r[4]||'',han:r[5]||'',noicap:r[6]||'',gc:r[7]||'',tt:r[8]||'',days,st:stOf(days)};
  }).filter(r=>r.loai||r.maNS);
}

function parseNS(rows){
  // Cột NhanSu: STT|HọTên|NgàySinh|GiớiTính|NơiSinh|ĐT|Email|NơiỞ|QuêQuán|HìnhẢnh
  return rows.map((r,i)=>{
    const id=String(r[0]||'').trim()||String(i+1);
    const hsCon=HS.filter(h=>h.maNS===id);
    const minDays=hsCon.length?Math.min(...hsCon.map(h=>h.days??9999)):null;
    const alSt=minDays===null?'safe':stOf(minDays);
    let a=r[9]||'';const m=a.match(/\/d\/([a-zA-Z0-9_-]+)/);if(m)a='https://drive.google.com/thumbnail?id='+m[1]+'&sz=w400';
    return{ri:i+2,stt:r[0]||i+1,ht:r[1]||'',ns:r[2]||'',gt:r[3]||'',nsi:r[4]||'',dt:r[5]||'',em:r[6]||'',no:r[7]||'',qq:r[8]||'',avt:a,hsCon,minDays,alSt};
  }).filter(r=>r.ht);
}

function afterLoad(){
  HS=HS.filter(h=>NS.some(n=>String(n.stt)===h.maNS));
  updateBadge();
  document.getElementById('syncTime').textContent=new Date().toLocaleTimeString('vi-VN');
  document.getElementById('syncInfo').textContent=`${NS.length} nhân sự · ${HS.length} hồ sơ`;
  render();
}

function loadDemo(){
  const d=n=>{const x=new Date();x.setDate(x.getDate()+n);return`${String(x.getDate()).padStart(2,'0')}/${String(x.getMonth()+1).padStart(2,'0')}/${x.getFullYear()}`;};
  const rHS=[
    [1,'1','Bảo Hiểm Y Tế','7939424550','12/06/2026',d(360),'BHXH Q.7','',''],
    [2,'1','CCCD','079123456789','01/01/2021',d(-160),'CA TP.HCM','',''],
    [3,'2','Bảo Hiểm Y Tế','7939691242','','30/09/2026','','Chưa cập nhật ngày cấp',''],
    [4,'3','Hộ Chiếu','B1234567','15/03/2020',d(5),'Cục XNC','',''],
    [5,'3','Giấy phép lái xe','012345678901','20/01/2022',d(45),'Sở GTVT','','Đã cảnh báo'],
    [6,'4','Bảo Hiểm Y Tế','7909006307','','26/10/2026','','',''],
    [7,'4','CCCD','079987654321','05/05/2020',d(200),'','',''],
  ];
  HS=parseHS(rHS);
  const rNS=[
    ['1','Nguyễn Hoàng Minh Phúc','15/04/1995','Nam','TP.HCM','0901234567','phuc@email.com','Q.7, TP.HCM','Long An'],
    ['2','Nguyễn Hoàng Phương Linh','22/08/1998','Nữ','Hà Nội','0912345678','linh@email.com','Q.3, TP.HCM','Hà Nội'],
    ['3','Lê Hoàng Cường','10/05/1990','Nam','Đà Nẵng','0923456789','cuong@email.com','Q.1, TP.HCM','Đà Nẵng'],
    ['4','Phạm Thị Dung','03/11/2000','Nữ','Cần Thơ','0934567890','dung@email.com','Bình Thạnh, TP.HCM','Cần Thơ'],
  ];
  NS=parseNS(rNS);
}

function enc(s){return encodeURIComponent(s);}

// ══════════════════════════════════════════════════════════
// NAV & BADGES
// ══════════════════════════════════════════════════════════
function updateBadge(){
  const cnt=NS.filter(n=>n.alSt!=='safe'&&n.alSt!=='ok').length;
  ['nb-ns','nb-warn'].forEach(id=>{
    const el=document.getElementById(id);
    if(cnt>0){el.style.display='';el.textContent=cnt;}else el.style.display='none';
  });
}

function go(p){
  page=p; searchQ=''; filterSt='all';
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  document.getElementById('ni-'+p)?.classList.add('active');
  const titles={dash:'📊 Tổng quan',ns:'👥 Nhân sự & Hồ sơ',warn:'🔔 Cần xử lý',set:'⚙️ Cài đặt'};
  document.getElementById('pgTitle').textContent=titles[p]||'';
  const btn=document.getElementById('btnAdd');
  btn.style.display=(p==='ns'||p==='warn')?'':'none';
  btn.textContent='＋ Thêm nhân sự'; btn.onclick=openAddNS;
  render();
}

function render(){
  const el=document.getElementById('ct');
  if(page==='dash') return renderDash(el);
  if(page==='ns')   return renderNS(el,NS);
  if(page==='warn') return renderNS(el,NS.filter(n=>n.alSt!=='safe'&&n.alSt!=='ok'),true);
  if(page==='set')  return renderSet(el);
}

// ══════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════
function renderDash(el){
  const exp=HS.filter(h=>h.st==='exp').length, urg=HS.filter(h=>h.st==='urg').length;

  const nsAlert=NS.filter(n=>n.alSt!=='safe'&&n.alSt!=='ok').length;
  const top=[...HS].filter(h=>h.days!==null).sort((a,b)=>a.days-b.days).slice(0,8);

  el.innerHTML=`
  <div class="sg">
    <div class="sc c-blue" onclick="go('ns')">
      <div class="sc-label">Tổng nhân sự</div>
      <div class="sc-val c-blue">${NS.length}</div>
      <div class="sc-sub">${HS.length} hồ sơ đang theo dõi</div>
    </div>
    <div class="sc c-red" onclick="go('warn')">
      <div class="sc-label">Đã hết hạn</div>
      <div class="sc-val c-red">${exp}</div>
      <div class="sc-sub">Cần gia hạn ngay</div>
    </div>
    <div class="sc c-amber" onclick="go('warn')">
      <div class="sc-label">Sắp hết hạn (&lt;${CFG.DAYS} ngày)</div>
      <div class="sc-val c-amber">${wrn+urg}</div>
      <div class="sc-sub">${nsAlert} nhân sự cần chú ý</div>
    </div>
    <div class="sc c-green">
      <div class="sc-label">Còn hạn</div>
      <div class="sc-val c-green">${ok}</div>
      <div class="sc-sub">Bình thường</div>
    </div>
  </div>
  <div class="dash-grid">
    <div class="cc">
      <h3>📈 Phân bổ trạng thái hồ sơ</h3>
      <div class="cw"><canvas id="ch-donut"></canvas></div>
    </div>
    <div class="cc">
      <h3>⏰ Hồ sơ sắp hết hạn gần nhất</h3>
      ${top.length===0?'<div class="empty"><div class="empty-ico">✅</div><h3>Không có hồ sơ cần cảnh báo</h3></div>':`
      <table style="width:100%;font-size:13px;border-collapse:collapse">
        <thead><tr>
          <th style="text-align:left;padding:6px 2px;color:var(--ink3);font-size:11px;border-bottom:1px solid var(--border);font-weight:600">NHÂN SỰ / HỒ SƠ</th>
          <th style="text-align:right;padding:6px 2px;color:var(--ink3);font-size:11px;border-bottom:1px solid var(--border);font-weight:600">CÒN LẠI</th>
        </tr></thead>
        <tbody>${top.map(h=>{
          const ns=NS.find(n=>String(n.stt)===h.maNS);
          return`<tr><td style="padding:8px 2px;border-bottom:1px solid var(--border)">
            <div style="font-weight:600;color:var(--ink)">${h.loai}</div>
            <div style="font-size:11px;color:var(--ink3);margin-top:2px">${ns?ns.ht:('Mã: '+h.maNS)} · ${fmtD(h.han)}</div>
          </td><td style="text-align:right;padding:8px 2px;border-bottom:1px solid var(--border)">${stBadge(h)}</td></tr>`;}).join('')}
        </tbody>
      </table>`}
    </div>
  </div>`;

  setTimeout(()=>{
    const ctx=document.getElementById('ch-donut');if(!ctx) return;
    if(charts.donut) charts.donut.destroy();
    charts.donut=new Chart(ctx,{type:'doughnut',data:{
      labels:['Hết hạn','Khẩn cấp (<7N)','Sắp hết','Còn hạn'],
      datasets:[{data:[exp,urg,wrn,ok],backgroundColor:['#D94040','#E6A000','#C47D0E','#2E7D32'],borderWidth:3,borderColor:'#fff'}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:14,boxWidth:12}}},cutout:'62%'}});
  },60);
}

// ══════════════════════════════════════════════════════════
// BẢNG NHÂN SỰ 2 CẤP
// ══════════════════════════════════════════════════════════
function renderNS(el,list,wOnly=false){
  let fl=list;
  if(searchQ){
    const q=searchQ.toLowerCase();
    fl=fl.filter(n=>n.ht.toLowerCase().includes(q)||n.dt.includes(q)||n.em.toLowerCase().includes(q)||n.no.toLowerCase().includes(q)||n.qq.toLowerCase().includes(q)||n.hsCon.some(h=>h.loai.toLowerCase().includes(q)||h.so.includes(q)));
  }
  if(filterSt!=='all'){
    if(filterSt==='exp') fl=fl.filter(n=>n.alSt==='exp');
    else if(filterSt==='wrn') fl=fl.filter(n=>n.alSt==='wrn'||n.alSt==='urg');
    else if(filterSt==='ok') fl=fl.filter(n=>n.alSt==='ok'||n.alSt==='safe');
  }

  el.innerHTML=`
  <div class="tbar">
    <div class="sw-wrap">
      <span class="sw-icon">🔍</span>
      <input type="text" placeholder="Tìm tên, SĐT, email, nơi ở, loại hồ sơ..." value="${searchQ}" oninput="searchQ=this.value;render()"/>
    </div>
    <div class="filter-tabs">
      <button class="ft ${filterSt==='all'?'active':''}" onclick="filterSt='all';render()">Tất cả (${list.length})</button>

      <button class="ft ft-amber ${filterSt==='wrn'?'active':''}" onclick="filterSt='wrn';render()">🟡 Sắp hết</button>
      <button class="ft ft-green ${filterSt==='ok'?'active':''}" onclick="filterSt='ok';render()">🟢 An toàn</button>
    </div>
    <button class="btn btn-sm" onclick="document.getElementById('import-file').click()">📥 Import</button>
    <input type="file" id="import-file" accept=".xlsx, .xls" style="display:none" onchange="handleImport(this)"/>
    <button class="btn btn-sm" onclick="exportXL()">📤 Excel</button>
    <button class="btn btn-sm" onclick="printAll()">🖨️ In</button>
    <button class="btn btn-sm" style="color:var(--blue);border-color:var(--blue-m)" onclick="triggerSendMails()">📧 Gửi mail cảnh báo</button>
  </div>

  <div class="tw">
    <table>
      <thead><tr>
        <th style="width:36px"></th>
        <th style="width:42px">STT</th>
        <th>Họ và Tên</th>
        <th>Ngày sinh</th>
        <th>Số điện thoại</th>
        <th>Nơi ở hiện tại</th>
        <th>Quê quán</th>
        <th style="min-width:130px">Báo động</th>
        <th style="text-align:center;width:110px">Hành động</th>
      </tr></thead>
      <tbody id="nsTbody">
      ${fl.length===0?`<tr><td colspan="9"><div class="empty">
        <div class="empty-ico">👥</div>
        <h3>${NS.length===0?'Chưa có nhân sự nào':'Không tìm thấy kết quả'}</h3>
        <p>${NS.length===0?'Nhấn "+ Thêm nhân sự" để bắt đầu':''}</p>
      </div></td></tr>`:fl.map(n=>nsRow(n)).join('')}
      </tbody>
    </table>
    <div class="tf">
      <span>Hiển thị <strong>${fl.length}</strong> / ${list.length} nhân sự</span>
      <span style="color:var(--ink3)">${HS.length} hồ sơ tổng cộng</span>
    </div>
  </div>`;
}

function nsRow(n){
  const isOpen=expanded.has(n.ri);
  return`
  <tr class="pr ${isOpen?'open':''}" id="pr-${n.ri}" onclick="toggle(${n.ri})">
    <td style="text-align:center"><span class="exp-ico ${isOpen?'open':''}">▶</span></td>
    <td style="color:var(--ink3);text-align:center;font-size:13px">${n.stt}</td>

function alBadge(n){
  const cnt=(s)=>n.hsCon.filter(h=>h.st===s).length;
  if(n.hsCon.length===0) return '<span style="color:var(--ink4);font-size:12px">Chưa có hồ sơ</span>';
  if(n.alSt==='exp') return`<span class="al-danger">🔴 ${cnt('exp')} hết hạn</span>`;
  if(n.alSt==='urg') return`<span class="al-danger">🟠 Khẩn cấp!</span>`;
  if(n.alSt==='wrn') return`<span class="al-warn">🟡 ${cnt('wrn')+cnt('urg')} sắp hết</span>`;
  return'<span class="al-safe">🟢 An toàn</span>';
}

function stBadge(h){
  if(h.st==='exp') return`<span class="badge b-exp"><span class="bd bd-exp"></span>Hết hạn ${Math.abs(h.days)} ngày</span>`;
  if(h.st==='urg') return`<span class="badge b-urg"><span class="bd bd-urg"></span>Còn ${h.days} ngày ⚡</span>`;
  if(h.st==='wrn') return`<span class="badge b-wrn"><span class="bd bd-wrn"></span>Còn ${h.days} ngày</span>`;
  if(h.st==='ok')  return`<span class="badge b-ok"><span class="bd bd-ok"></span>Còn ${h.days} ngày</span>`;
  return'<span style="color:var(--ink4);font-size:12px">—</span>';
}

async function saveNS(){
  const ht=document.getElementById('ns-ht').value.trim();
  if(!ht){toast('⚠️ Vui lòng nhập Họ và Tên','err');return;}
  
  const btn = document.querySelector('#ovNS .btn-p');
  const oriTxt = btn.textContent;
  btn.textContent = '⏳ Đang lưu...';
  btn.disabled = true;

  try {
    let avtUrl = document.getElementById('ns-avt-url').value;
    const b64 = document.getElementById('ns-avt-base64').value;
    if (b64) {
      showLo('Đang tải ảnh 4x6...');
      const payload = {
        action: 'uploadAvatar',
        base64: b64,
        mimeType: 'image/jpeg',
        fileName: 'Avt_' + ht + '.jpg'
      };
      const r = await fetch(CFG.URL, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain;charset=utf-8'},
        body: JSON.stringify(payload)
      }).then(r=>r.json());
      hideLo();
      if(r.error) throw new Error(r.error);
      avtUrl = r.url;
      const match = avtUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match) avtUrl = 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w400';
    }

    // Cột: STT|HọTên|NgàySinh|GiớiTính|NơiSinh|ĐT|Email|NơiỞ|QuêQuán|HìnhẢnh
    const row=[
      document.getElementById('ns-stt').value||'',ht,
      fromInp(document.getElementById('ns-ns').value),
      document.getElementById('ns-gt').value,
      document.getElementById('ns-nsi').value,
      document.getElementById('ns-dt').value,
      document.getElementById('ns-em').value,
      document.getElementById('ns-no').value,
      document.getElementById('ns-qq').value,
      avtUrl
    ];
    closeOv('ovNS');
    await saveRow(editNS?'update':'append',CFG.SH_NS,editNS?.ri,row,editNS?'✅ Cập nhật nhân sự':'✅ Thêm nhân sự mới');
  } catch(e) {
    hideLo();
    toast('Lỗi: ' + e.message, 'err');
  } finally {
    btn.textContent = oriTxt;
    btn.disabled = false;
  }
}

function previewAvatar(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const targetW = 240, targetH = 360;
      canvas.width = targetW; canvas.height = targetH;
      const ratio = Math.max(targetW / img.width, targetH / img.height);
      const nw = img.width * ratio, nh = img.height * ratio;
      const ox = (targetW - nw) / 2, oy = (targetH - nh) / 2;
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,targetW,targetH);
      ctx.drawImage(img, ox, oy, nw, nh);
      const b64 = canvas.toDataURL('image/jpeg', 0.85);
      document.getElementById('ns-avt-img').src = b64;
      document.getElementById('ns-avt-img').style.display = 'block';
      document.getElementById('ns-avt-ph').style.display = 'none';
      document.getElementById('ns-avt-base64').value = b64.split(',')[1];
      document.getElementById('ns-avt-url').value = '';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveRow(action,sheet,ri,data,msg){

  try{
    const rp=ri?`&rowIndex=${ri}`:'';
    const url=`${CFG.URL}?action=${action}&sheet=${enc(sheet)}${rp}&data=${enc(JSON.stringify(data))}`;
    const r=await fetch(url); const j=await r.json();
    if(j.error) throw new Error(j.error);
    toast(msg,'ok'); await refreshData();
  }catch(e){toast('❌ '+e.message,'err');hideLo();}
}

function copyBE(){
  const code=`// ══════════════════════════════════════════════════════════
// BACKEND v4 – Balihouse Hồ Sơ Manager (Tự động gửi mail & Web App)
// ══════════════════════════════════════════════════════════
function doGet(e) { 
  if (!e.parameter.action) {
    return HtmlService.createHtmlOutputFromFile('Index')
      .setTitle('Hồ Sơ Manager - Balihouse')
      .setXFrameOptionsMode(HtmlService.XFrameOptionsMode.ALLOWALL)
      .addMetaTag('viewport', 'width=device-width, initial-scale=1');
  }
  return handle(e); 
}

function handle(e) {
  const action = e.parameter.action || '';
  const sheet  = e.parameter.sheet  || 'Sheet1';
  const ss     = SpreadsheetApp.getActiveSpreadsheet();
  const sh     = ss.getSheetByName(sheet);

  // PING – kiểm tra kết nối
  if (action === 'ping')
    return ok({ status: 'ok', message: 'Kết nối thành công! Sheet: ' + sheet });

  // SEND MAILS - Gửi mail cảnh báo thủ công qua API
  if (action === 'sendMails') {
    const daysLimit = parseInt(e.parameter.days) || 60;
    const adminEmail = e.parameter.email || Session.getActiveUser().getEmail();
    try {
      const sentCount = autoSendMails(ss, daysLimit, adminEmail);
      return ok({ status: 'ok', sentCount: sentCount });
    } catch(error) {
      return err(error.toString());
    }
  }

  // GET ALL – lấy toàn bộ dữ liệu
  if (action === 'getAll') {
    if (!sh) return ok({ rows: [] });
    const last = sh.getLastRow();
    if (last < 2) return ok({ rows: [] });
    return ok({ rows: sh.getRange(2, 1, last - 1, 10).getValues() });
  }

  // APPEND – thêm hàng mới
  if (action === 'append') {
    if (!sh) return err('Không tìm thấy sheet: ' + sheet);
    const data = JSON.parse(decodeURIComponent(e.parameter.data || '[]'));
    sh.appendRow(data);
    return ok({ status: 'ok' });
  }

  // UPDATE – cập nhật hàng
  if (action === 'update') {
    if (!sh) return err('Không tìm thấy sheet: ' + sheet);
    const ri   = parseInt(e.parameter.rowIndex);
    const data = JSON.parse(decodeURIComponent(e.parameter.data || '[]'));
    if (!ri) return err('Thiếu rowIndex');
    sh.getRange(ri, 1, 1, data.length).setValues([data]);
    return ok({ status: 'ok' });
  }

  // DELETE – xóa hàng
  if (action === 'delete') {
    if (!sh) return err('Không tìm thấy sheet: ' + sheet);
    const ri = parseInt(e.parameter.rowIndex);
    if (!ri) return err('Thiếu rowIndex');
    sh.deleteRow(ri);
    return ok({ status: 'ok' });
  }

  return err('Action không hợp lệ: ' + action);
}

function ok(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}
function err(msg) {
  return ContentService.createTextOutput(JSON.stringify({ error: msg }))
}

// ══════════════════════════════════════════════════════════
// POST REQUESTS (Cho Upload Ảnh & Import Bulk)
// ══════════════════════════════════════════════════════════
function doPost(e) {
  try {
    const payload = JSON.parse(e.postData.contents);
    const action = payload.action;
    const sheetName = payload.sheet || 'NhanSu';
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const sh = ss.getSheetByName(sheetName);

    if (action === 'uploadAvatar') {
      const folderName = "Anh_NhanSu";
      const folders = DriveApp.getFoldersByName(folderName);
      const folder = folders.hasNext() ? folders.next() : DriveApp.createFolder(folderName);
      
      const blob = Utilities.newBlob(Utilities.base64Decode(payload.base64), payload.mimeType, payload.fileName);
      const file = folder.createFile(blob);
      file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
      return ok({ status: 'ok', url: file.getUrl() });
    }

    if (action === 'importBulk') {
      if (!sh) return err('Không tìm thấy sheet: ' + sheetName);
      const rows = payload.rows;
      if (!rows || rows.length === 0) return ok({ status: 'ok', count: 0 });
      
      const lastRow = sh.getLastRow();
      const startRow = lastRow < 1 ? 1 : lastRow + 1;
      sh.getRange(startRow, 1, rows.length, rows[0].length).setValues(rows);
      return ok({ status: 'ok', count: rows.length });
    }

    return err('Action POST không hợp lệ');
  } catch (error) {
    return err(error.toString());
  }
}

// ══════════════════════════════════════════════════════════
// TỰ ĐỘNG GỬI MAIL
// ══════════════════════════════════════════════════════════
function triggerDailyEmails() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  // Thay số 60 thành số ngày bạn muốn cảnh báo trước
  autoSendMails(ss, 60, Session.getActiveUser().getEmail());
}

function autoSendMails(ss, daysLimit, adminEmail) {
  const shNS = ss.getSheetByName('NhanSu') || ss.getSheets()[0];
  const shHS = ss.getSheetByName('HoSo') || ss.getSheets()[1];
  if (!shNS || !shHS) throw new Error("Không tìm thấy sheet NhanSu hoặc HoSo");

  const nsData = shNS.getDataRange().getDisplayValues();
  const hsData = shHS.getDataRange().getDisplayValues();
  
  const nsMap = {};
  for (let i = 1; i < nsData.length; i++) {
    const stt = String(nsData[i][0]).trim();
    nsMap[stt] = { name: nsData[i][1], email: nsData[i][6] };
  }
  
  const today = new Date();
  today.setHours(0,0,0,0);
  let alertHtml = "<h3>Danh sách hồ sơ sắp/đã hết hạn:</h3><ul>";
  let countAlert = 0;
  
  for (let i = 1; i < hsData.length; i++) {
    const r = hsData[i];
    const maNS = String(r[1]).trim();
    const loai = r[2];
    const so = r[3];
    const hanStr = r[5];
    const tt = r[8];
    
    if (!hanStr || tt === 'Đã cảnh báo') continue;
    
    const parts = String(hanStr).split('/');
    if (parts.length !== 3) continue;
    const hanDate = new Date(parts[2], parts[1]-1, parts[0]);
    
    const daysLeft = Math.floor((hanDate - today) / 86400000);
    if (daysLeft <= daysLimit) {
      const nsInfo = nsMap[maNS] || {name: 'Mã NS: '+maNS, email: ''};
      
      // Đánh dấu đã cảnh báo (Cột I - Cột 9)
      shHS.getRange(i+1, 9).setValue('Đã cảnh báo');
      
      const dayText = daysLeft < 0 ? 'ĐÃ HẾT HẠN ' + Math.abs(daysLeft) + ' ngày' : 'Còn ' + daysLeft + ' ngày';
      alertHtml += '<li><b>' + nsInfo.name + '</b> - ' + loai + ' (Số: ' + (so||'---') + ') - Hết hạn: ' + hanStr + ' (' + dayText + ')</li>';
      countAlert++;
      
      // Gửi mail cho nhân viên
      if (nsInfo.email && nsInfo.email.includes('@')) {
        try {
          MailApp.sendEmail({
            to: nsInfo.email,
            subject: '[CẢNH BÁO] Hồ sơ ' + loai + ' sắp hết hạn',
            htmlBody: '<p>Chào ' + nsInfo.name + ',</p><p>Hồ sơ <b>' + loai + '</b> (Số: ' + (so||'---') + ') của bạn sẽ hết hạn vào ngày <b>' + hanStr + '</b> (' + dayText + ').</p><p>Vui lòng làm thủ tục gia hạn sớm nhất có thể.</p><br/><p>Trân trọng,<br/>Balihouse Garden</p>'
          });
        } catch(e) {}
      }
    }
  }
  
  // Gửi mail tổng hợp cho admin
  if (countAlert > 0 && adminEmail && adminEmail.includes('@')) {
    alertHtml += "</ul>";
    try {
      MailApp.sendEmail({
        to: adminEmail,
        subject: '[Balihouse] Cảnh báo ' + countAlert + ' hồ sơ sắp hết hạn',
        htmlBody: alertHtml
      });
    } catch(e) {}
  }
  
  return countAlert;
}`;
  navigator.clipboard.writeText(code)
    .then(()=>toast('📋 Đã copy code Backend!','ok'))
    .catch(()=>{const t=document.createElement('textarea');t.value=code;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);toast('📋 Đã copy!','ok');});
}

function exportXL(){
  try{
    const wb=XLSX.utils.book_new();
    // Sheet nhân sự
    const hNS=['STT','Họ Tên','Ngày Sinh','Giới Tính','Nơi Sinh','Điện Thoại','Email','Nơi Ở','Quê Quán','Số Hồ Sơ','Trạng Thái'];
    const rNS=NS.map(n=>[n.stt,n.ht,fmtD(n.ns),n.gt,n.nsi,n.dt,n.em,n.no,n.qq,n.hsCon.length,n.alSt==='exp'?'Hết hạn':n.alSt==='wrn'||n.alSt==='urg'?'Sắp hết':'An toàn']);
    const ws1=XLSX.utils.aoa_to_sheet([hNS,...rNS]);
    ws1['!cols']=[6,26,12,10,14,14,22,18,14,10,10].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws1,'Nhân Sự');
    // Sheet hồ sơ
    const hHS=['STT','Mã NS','Họ Tên NS','Loại HoSo','Số HoSo','Nơi Cấp','Ngày Cấp','Ngày Hết Hạn','Còn Lại','Ghi Chú'];
    const rHS=HS.map(h=>{const n=NS.find(x=>String(x.stt)===h.maNS);return[h.stt,h.maNS,n?n.ht:'',h.loai,h.so,h.noicap,fmtD(h.cap),fmtD(h.han),h.days!==null?h.days:'—',h.gc];});
    const ws2=XLSX.utils.aoa_to_sheet([hHS,...rHS]);
    ws2['!cols']=[6,8,24,20,16,16,12,14,10,20].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws2,'Hồ Sơ');
    const dt=new Date().toLocaleDateString('vi-VN').replace(/\//g,'-');
    XLSX.writeFile(wb,`BaliHouse_HoSo_${dt}.xlsx`);
    toast('📥 Xuất Excel thành công (2 sheet)','ok');
  }catch(e){toast('❌ Lỗi: '+e.message,'err');}
}
